<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#f59e0b">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon-192.png">
  <title>MAR Mekanik</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .top { position: sticky; top: 0; background: #1e293b; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #f59e0b; z-index: 5; }
    .top h1 { font-size: 17px; color: #f59e0b; flex: 1; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }
    .net { font-size: 12px; color: #94a3b8; }
    .wrap { padding: 14px; max-width: 560px; margin: 0 auto; }
    .card, .panel { background: #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #334155; }
    .cardTop { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .badge { font-size: 11px; font-weight: 700; color: #fff; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
    .cardBody { font-size: 14px; color: #cbd5e1; }
    .ket { font-size: 13px; color: #fbbf24; margin-top: 6px; background: #78350f33; padding: 6px 8px; border-radius: 8px; }
    .err { font-size: 13px; color: #fca5a5; margin-top: 8px; background: #7f1d1d33; padding: 8px; border-radius: 8px; }
    .big { display: block; width: 100%; margin-top: 10px; padding: 13px; font-size: 16px; font-weight: 700; color: #0f172a; background: #f59e0b; border: 0; border-radius: 10px; }
    .big:active { transform: scale(0.98); }
    .mini { padding: 6px 12px; font-size: 13px; border: 0; border-radius: 8px; background: #f59e0b; color: #0f172a; font-weight: 700; margin-top: 6px; }
    .mini.gray { background: #475569; color: #e2e8f0; }
    .empty { text-align: center; color: #64748b; padding: 40px 10px; line-height: 1.7; }
    .sub { font-size: 12px; color: #64748b; margin: 4px 0 10px; }
    input, select { width: 100%; padding: 12px; font-size: 16px; background: #0f172a; color: #e2e8f0; border: 1px solid #475569; border-radius: 10px; margin: 5px 0 12px; }
    label { font-size: 13px; color: #94a3b8; font-weight: 600; }
    #toast { display: none; position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: #f59e0b; color: #0f172a; font-weight: 700; padding: 11px 18px; border-radius: 10px; font-size: 14px; z-index: 99; max-width: 92vw; text-align: center; }
    #formModal { display: none; position: fixed; inset: 0; background: rgba(2,6,23,.9); z-index: 50; align-items: flex-end; justify-content: center; }
    .sheet { background: #1e293b; width: 100%; max-width: 560px; border-radius: 18px 18px 0 0; padding: 18px 16px 24px; max-height: 92vh; overflow-y: auto; }
    .sheet h2 { font-size: 15px; color: #f59e0b; margin-bottom: 4px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .syncbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .syncbar button { flex: 0 0 auto; }
    .obinfo { font-size: 13px; color: #fbbf24; font-weight: 700; }
  </style>
</head>
<body>
  <div class="top">
    <h1>🔧 MAR Mekanik</h1>
    <span class="dot" id="netDot"></span><span class="net" id="netText">-</span>
  </div>

  <!-- LAYAR LOGIN TOKEN -->
  <div class="wrap" id="screen-login" style="display:none">
    <div class="panel">
      <h2 style="color:#f59e0b;font-size:16px;margin-bottom:4px">Masukkan Token</h2>
      <p class="sub">Token diberikan oleh admin, cukup diisi SEKALI.</p>
      <input id="tokenInput" placeholder="contoh: a1b2c3d4e5f6..." autocomplete="off">
      <button class="big" onclick="doLogin()">Masuk</button>
    </div>
  </div>

  <!-- LAYAR UTAMA -->
  <div class="wrap" id="screen-main" style="display:none">
    <div class="syncbar">
      <button class="mini" id="syncBtn" onclick="syncNow(true)">🔄 Sync</button>
      <div>
        <div style="font-size:13px;font-weight:700" id="meName"></div>
        <div class="sub" style="margin:0" id="lastSync"></div>
      </div>
    </div>
    <div class="obinfo" id="outboxInfo"></div>
    <div id="woList"></div>
  </div>

  <!-- FORM SUBMIT -->
  <div id="formModal">
    <div class="sheet">
      <h2 id="fTitle">-</h2>
      <div class="ket" id="fKet" style="margin-bottom:10px"></div>
      <div class="row2">
        <div><label>Jam Mulai *</label><input type="datetime-local" id="fStart"></div>
        <div><label>Jam Selesai *</label><input type="datetime-local" id="fEnd"></div>
      </div>
      <div class="row2">
        <div><label>Hour Meter (HM) *</label><input type="number" id="fHm" min="0.1" step="any" placeholder="cth: 1250"></div>
        <div><label>Kilometer (KM) *</label><input type="number" id="fKm" min="0.1" step="any" placeholder="cth: 4500"></div>
      </div>
      <label>Spare Part yang Dipakai</label>
      <select id="fPart">
        <option value="">Tanpa Part</option>
        <option value="baru">🆕 Part Baru</option>
        <option value="repair">🔧 Part Repair</option>
        <option value="kanibal">♻️ Part Kanibal</option>
      </select>
      <button class="big" onclick="queueSubmit()">📮 Simpan &amp; Antre Kirim</button>
      <button class="big" style="background:#475569;color:#e2e8f0;margin-top:8px" onclick="closeForm()">Batal</button>
    </div>
  </div>

  <div id="toast"></div>
  <script src="./app.js"></script>
</body>
</html>
